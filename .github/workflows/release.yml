name: Release Build

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Prepare signing keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "${ANDROID_KEYSTORE_BASE64}"
          test -n "${ANDROID_KEYSTORE_PASSWORD}"
          test -n "${ANDROID_KEY_ALIAS}"
          test -n "${ANDROID_KEY_PASSWORD}"

          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/release-keystore.jks"

          {
            echo "ANDROID_SIGNING_STORE_FILE=${RUNNER_TEMP}/release-keystore.jks"
            echo "ANDROID_SIGNING_STORE_PASSWORD=${ANDROID_KEYSTORE_PASSWORD}"
            echo "ANDROID_SIGNING_KEY_ALIAS=${ANDROID_KEY_ALIAS}"
            echo "ANDROID_SIGNING_KEY_PASSWORD=${ANDROID_KEY_PASSWORD}"
          } >> "${GITHUB_ENV}"

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          else
            TAG_NAME="${GITHUB_REF_NAME:-manual}"
          fi

          VERSION_NAME="${TAG_NAME#v}"
          if [[ -z "${VERSION_NAME}" || "${VERSION_NAME}" == "${TAG_NAME}" && "${TAG_NAME}" == "manual" ]]; then
            VERSION_NAME="manual-${GITHUB_RUN_NUMBER}"
          fi

          APK_NAME="AppBlocker-${VERSION_NAME}.apk"

          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "version_name=${VERSION_NAME}" >> "${GITHUB_OUTPUT}"
          echo "version_code=${GITHUB_RUN_NUMBER}" >> "${GITHUB_OUTPUT}"
          echo "apk_name=${APK_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Build release APK
        run: >
          ./gradlew assembleRelease --no-daemon
          -PAPP_VERSION_NAME=${{ steps.release_meta.outputs.version_name }}
          -PAPP_VERSION_CODE=${{ steps.release_meta.outputs.version_code }}

      - name: Rename APK
        run: >
          mv app/build/outputs/apk/release/app-release.apk
          app/build/outputs/apk/release/${{ steps.release_meta.outputs.apk_name }}

      - name: Upload release artifact
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          files: app/build/outputs/apk/release/${{ steps.release_meta.outputs.apk_name }}

      - name: Upload workflow artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release_meta.outputs.apk_name }}
          path: app/build/outputs/apk/release/${{ steps.release_meta.outputs.apk_name }}
